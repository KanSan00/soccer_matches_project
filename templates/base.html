<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}サッカー日本代表戦績管理{% endblock %}</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .navbar-brand-jp {
            font-weight: bold;
            color: #0033a0 !important;
            /* サムライブルーに近いネイビーブルー */
        }
    </style>
</head>

<body>
    <!-- ナビゲーションバー -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand text-primary fw-bold" href="{% url 'matches:match_list' %}">🇯🇵 SAMURAI BLUE
                戦績管理</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'admin:index' %}" target="_blank">管理画面</a>
            </div>
        </div>
    </nav>
    <!-- メインコンテンツ -->
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
    <!-- フッター -->
    <footer class="text-center text-muted py-4 mt-5 border-top">
        <div class="container">
            <p>&copy; 2026 サッカー日本代表戦績データベース</p>
        </div>
    </footer>
    <!-- Bootstrap Bundle JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
